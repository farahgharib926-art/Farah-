@keyframes shimmer{0%{background-position:-600px 0}100%{background-position:600px 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

@keyframes scaleIn{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}
.fu{animation:fadeUp .38s ease forwards;opacity:0}
.si{animation:scaleIn .32s ease forwards;opacity:0}
.sk{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);background-size:600px 100%;animation:shimmer 1.4s infinite;border-radius:10px}

.bg{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#080810;box-shadow:0 4px 18px var(--glow)}
.bg:hover{transform:translateY(-2px);box-shadow:0 8px 30px var(--glow)}
.bg:active{transform:none}.bg:disabled{opacity:.55;transform:none;cursor:not-allowed}
.bgh{background:var(--card);color:var(--muted);border:1px solid var(--card-b)}
.bgh:hover{background:var(--bg4);color:var(--text)}
.bdd{background:rgba(239,68,68,.1);color:var(--red);border:1.5px solid rgba(239,68,68,.3)}
.bdd:hover{background:rgba(239,68,68,.2)}
.bsm{padding:7px 13px;font-size:12px;border-radius:9px}
.blg{padding:13px 26px;font-size:16px}
.bfw{width:100%}
.cd{background:var(--card);border:1px solid var(--card-b);border-radius:var(--r);backdrop-filter:blur(12px);transition:all var(--t)}
.cdh:hover{border-color:rgba(245,166,35,.3);transform:translateY(-3px);box-shadow:0 14px 44px rgba(0,0,0,.3);cursor:pointer}
.inp{background:var(--bg4);border:1.5px solid var(--bg5);border-radius:var(--rs);color:var(--text);font-family:inherit;font-size:15px;padding:12px 15px;width:100%;transition:border-color var(--t),box-shadow var(--t);outline:none}
.inp:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--glow)}.inp::placeholder{color:var(--muted2)}
textarea.inp{resize:vertical;min-height:80px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700}
.bgd{background:rgba(245,166,35,.12);color:var(--gold);border:1px solid rgba(245,166,35,.28)}
.bgn{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.28)}
.bgb{background:rgba(99,102,241,.12);color:var(--blue);border:1px solid rgba(99,102,241,.28)}
.bgr{background:var(--bg4);color:var(--muted);border:1px solid var(--bg5)}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;flex-shrink:0}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block}
.don{background:var(--green);box-shadow:0 0 7px var(--green)}.dob{background:var(--gold);box-shadow:0 0 7px var(--gold)}
.stars{color:var(--gold);letter-spacing:-1px}
.gl{height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.35}
.dv{height:1px;background:var(--card-b);margin:14px 0}
.nsc{scrollbar-width:none}.nsc::-webkit-scrollbar{display:none}
.sw{max-width:820px;margin:0 auto;padding:0 16px}
label{font-size:13px;color:var(--muted);margin-bottom:5px;display:block;font-weight:600}

  const [msgs,setMsgs]=useState(()=>{try{return JSON.parse(localStorage.getItem('hf_msgs'))||{}}catch{return{}}});
  const t=T[lang];const ar=lang==='ar';

  useEffect(()=>{
    document.documentElement.setAttribute('data-theme',theme);
    document.documentElement.setAttribute('data-lang',lang);
    document.documentElement.lang=lang;
    document.documentElement.dir=ar?'rtl':'ltr';
    document.title=ar?'حرفي | منصة الحرفيين':'Harfi | Craftsmen Platform';
    const mc=document.getElementById('themeColorMeta');
    if(mc)mc.setAttribute('content',theme==='dark'?'#080810':'#f4f4ef');
  },[theme,lang,ar]);

  const toggleTheme=()=>{const n=theme==='dark'?'light':'dark';setTheme(n);localStorage.setItem('hf_theme',n);};
  const toggleLang=()=>{const n=lang==='ar'?'en':'ar';setLang(n);localStorage.setItem('hf_lang',n);};

  const login=(email,pw)=>{
    if(email===DEMO.email&&pw===DEMO.pw){const u={...DEMO};setUser(u);localStorage.setItem('hf_user',JSON.stringify(u));return true;}
    const saved=JSON.parse(localStorage.getItem('hf_users')||'[]');
    const u=saved.find(x=>x.email===email&&x.pw===pw);
    if(u){setUser(u);localStorage.setItem('hf_user',JSON.stringify(u));return true;}
    return false;
  };
  const register=(name,email,pw,phone,location)=>{
    const users=JSON.parse(localStorage.getItem('hf_users')||'[]');
    if(users.find(x=>x.email===email))return false;
    const u={id:'u'+Date.now(),name,email,pw,phone,avatar:name[0]||'U',color:'#1565C0',bookings:0,completed:0,rating:5.0,location:location||'القاهرة'};
    users.push(u);localStorage.setItem('hf_users',JSON.stringify(users));
    setUser(u);localStorage.setItem('hf_user',JSON.stringify(u));return true;
  };
  const logout=()=>{setUser(null);localStorage.removeItem('hf_user');};
  const updUser=(d)=>{const u={...user,...d};setUser(u);localStorage.setItem('hf_user',JSON.stringify(u));};

  const addBk=(bk)=>{
    const nb=[bk,...bks];setBks(nb);localStorage.setItem('hf_bks',JSON.stringify(nb));
    const sys={from:'system',text:ar?`تم تأكيد حجزك #${bk.id}! سيتواصل معك ${bk.wNameAr} قريباً.`:`Booking #${bk.id} confirmed! ${bk.wName} will contact you soon.`,time:new Date().toISOString()};
    const nm={...msgs,[bk.id]:[sys]};setMsgs(nm);localStorage.setItem('hf_msgs',JSON.stringify(nm));
  };

  const sendMsg=(bkId,text)=>{
    const m={from:'user',text,time:new Date().toISOString()};
    const cur=JSON.parse(localStorage.getItem('hf_msgs')||'{}');
    cur[bkId]=[...(cur[bkId]||[]),m];
    setMsgs({...cur});localStorage.setItem('hf_msgs',JSON.stringify(cur));
    setTimeout(()=>{
      const reps=t.replies;
      const rm={from:'worker',text:reps[Math.floor(Math.random()*reps.length)],time:new Date().toISOString()};
      const cur2=JSON.parse(localStorage.getItem('hf_msgs')||'{}');
      cur2[bkId]=[...(cur2[bkId]||[]),rm];
      setMsgs({...cur2});localStorage.setItem('hf_msgs',JSON.stringify(cur2));
    },2000+Math.random()*1000);
  };

  return <Ctx.Provider value={{theme,lang,t,ar,user,bks,msgs,toggleTheme,toggleLang,login,register,logout,updUser,addBk,sendMsg}}>
    {children}
  </Ctx.Provider>;
}
const useApp=()=>useContext(Ctx);
const nav=p=>{window.location.hash='#'+p;};
const stars=r=>'★'.repeat(Math.floor(r))+'☆'.repeat(5-Math.floor(r));

/* ── ROUTE ── */
function useRoute(){
  const [r,setR]=useState(()=>window.location.hash.slice(1)||'/');
  useEffect(()=>{const h=()=>setR(window.location.hash.slice(1)||'/');window.addEventListener('hashchange',h);return()=>window.removeEventListener('hashchange',h);},[]);
  return r;
}

  const [pay,setPay]=useState('Cash');
  const [bkLoc,setBkLoc]=useState(user?.location||'القاهرة');

    addBk(bk);setSuccess(bk);setLoading(false);

  if(success)return(

      <div>

/* ── CHAT ── */
function Chat({bid}){
  const {t,ar,user,bks,msgs,sendMsg}=useApp();
  const [text,setText]=useState('');
  const [send,setSend]=useState(false);
  const [tick,setTick]=useState(0);
  const bottom=useRef(null);
  if(!user){nav('/auth');return null;}
  const bk=bks.find(b=>b.id===bid);
  if(!bk){nav('/bookings');return null;}
  const ms=msgs[bid]||[];
  useEffect(()=>{bottom.current?.scrollIntoView({behavior:'smooth'});},[ms.length,tick]);
  const doSend=async()=>{
    if(!text.trim()||send)return;
    const txt=text.trim();setText('');setSend(true);
    sendMsg(bid,txt);setSend(false);
    setTimeout(()=>setTick(n=>n+1),2200);
  };
  const curMsgs=msgs[bid]||[];
  return(
    <div style={{display:'flex',flexDirection:'column',height:'100vh',background:'var(--bg)'}}>
      <div style={{background:'var(--bg2)',borderBottom:'1px solid rgba(245,166,35,.12)',padding:'11px 14px',display:'flex',alignItems:'center',gap:11,flexShrink:0}}>
        <button onClick={()=>nav('/bookings')} style={{background:'none',border:'none',color:'var(--muted)',cursor:'pointer',fontSize:17,fontFamily:'inherit',padding:'3px 7px',fontWeight:700}}>←</button>
        <div className="av" style={{width:38,height:38,fontSize:15,background:bk.cl}}>{bk.av}</div>
        <div>
          <div style={{fontWeight:700,fontSize:14}}>{ar?bk.wNameAr:bk.wName}</div>
          <div style={{fontSize:11,color:'var(--muted)'}}>{ar?bk.profAr:bk.prof}</div>
        </div>
        <span className="badge bgd" style={{margin:'0 auto'}}>#{bk.id}</span>
        <button className="btn bgh bsm" onClick={()=>nav(`/track/${bk.id}`)}>📍</button>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:13,display:'flex',flexDirection:'column',gap:9}}>
        {curMsgs.map((m,i)=>{
          const isU=m.from==='user';const isSys=m.from==='system';
          if(isSys)return<div key={i} style={{textAlign:'center'}}><span style={{fontSize:12,color:'var(--muted)',background:'var(--bg3)',padding:'5px 13px',borderRadius:20,display:'inline-block'}}>{m.text}</span></div>;
          return(
            <div key={i} style={{display:'flex',justifyContent:isU?(ar?'flex-start':'flex-end'):(ar?'flex-end':'flex-start'),animation:'fadeUp .2s ease'}}>
              <div style={{maxWidth:'75%',padding:'9px 13px',borderRadius:isU?'4px 15px 15px 15px':'15px 4px 15px 15px',background:isU?'var(--bg4)':'linear-gradient(135deg,var(--gold),var(--gold2))',color:isU?'var(--text)':'#080810',fontSize:14,lineHeight:1.55,border:isU?'1px solid var(--bg5)':'none',boxShadow:isU?'none':'0 4px 14px var(--glow)'}}>
                {m.text}
                <div style={{fontSize:10,marginTop:3,opacity:.5,textAlign:ar?'left':'right'}}>{new Date(m.time).toLocaleTimeString(ar?'ar-EG':'en-US',{hour:'2-digit',minute:'2-digit'})}</div>
              </div>
            </div>
          );
        })}
        <div ref={bottom}/>
      </div>
      <div style={{background:'var(--bg2)',borderTop:'1px solid rgba(245,166,35,.12)',padding:'9px 13px',display:'flex',gap:9,alignItems:'flex-end',flexShrink:0}}>
        <textarea className="inp" rows={1} placeholder={t.msgP} value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend();}}} style={{resize:'none',flex:1,maxHeight:100,overflowY:'auto',paddingTop:10,minHeight:42}}/>
        <button onClick={doSend} disabled={!text.trim()||send} style={{width:42,height:42,borderRadius:11,border:'none',cursor:'pointer',flexShrink:0,fontSize:17,background:text.trim()?'linear-gradient(135deg,var(--gold),var(--gold2))':'var(--bg4)',boxShadow:text.trim()?'0 4px 13px var(--glow)':'none',transition:'all var(--t)'}}>📤</button>
      </div>
    </div>
  );
}

          {t.lgout}
        </button>
      </div>
    </div>
  );
}

/* ── APP ── */
function Router(){
  const route=useRoute();
  const {user}=useApp();
  const render=()=>{
    if(route==='/'||route==='')return<Home/>;
    if(route==='/auth')return<Auth/>;
    if(route.startsWith('/worker/'))return<WorkerDetail id={route.split('/worker/')[1]}/>;
    if(route==='/bookings')return<Bookings/>;
    if(route.startsWith('/chat/'))return<Chat bid={route.split('/chat/')[1]}/>;
    if(route.startsWith('/track/'))return<Track bid={route.split('/track/')[1]}/>;
    if(route==='/profile')return<Profile/>;
    return<Home/>;
  };
  return<><Navbar route={route}/>{render()}</>;
}
function App(){return<AppProvider><Router/></AppProvider>;}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/sw.js').catch(()=>{});
  });
}
</script>
